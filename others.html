        /* coming-soon card */
        .coming-soon {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(250,161,28,0.1);
            border: 1px dashed rgba(250,161,28,0.4);
            border-radius: 8px; padding: 14px 20px;
            color: #faa11c; font-size: 0.95rem;
            margin-top: 8px;
        }
        .meme-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 32px;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            max-width: 640px; margin: 0 auto;
        }
        .meme-card img { max-width: 100%; border-radius: 10px; }
        .meme-card .quote {
            font-size: 1.1rem; color: var(--accent);
            font-style: italic; text-align: center;
        }
        .contact-qr {
            display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
        }
        .contact-qr img {
            width: 130px; border-radius: 8px;
            background: #ccc; padding: 4px;
        }
        .contact-qr a {
            color: var(--accent); text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        .contact-qr a:hover { opacity: 0.75; }
        .coming-soon::before { content: '🚧'; font-size: 1.2rem; }
    </style>
